# 욕설을 감지했을 때의 동작을 설정합니다: BLOCK(차단) 또는 REPLACE(검열)
action: BLOCK

# BLOCK 모드에서 플레이어에게 보낼 메시지를 설정합니다.
block-message: '<red>욕설이 포함된 채팅은 전송할 수 없습니다.'

# REPLACE 모드에서 욕설 글자를 대체할 문자를 설정합니다. (1글자만 사용가능)
replace-char: '*'

# 욕설 감지 시 irochi.guroyeksibal.notify 권한을 가진 관리자에게 알림을 전송합니다.
notify-staff: true

# 유저가 욕설을 사용했을 때 관리자가 받을 알림 메시지 형식을 설정합니다.
notify-format: '<yellow>[GuRoYeokSibal] <red>{player}<yellow>: <gray>{message}'

# TownyChat 연동: 필터링할 채널 이름 목록 (대소문자 무시)
# '*' 를 넣으면 모든 채널을 필터링합니다.
# TownyChat이 설치되지 않은 경우 이 설정은 무시됩니다.
towny-filtered-channels:
  - 'global'
  - 'local'
